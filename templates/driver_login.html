<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driver Login · BusGuard</title>
<style>
  :root{
    --ink:        #0B1F3A;
    --ink-2:      #122B52;
    --ink-3:      #1B3A6B;
    --line:       rgba(255,255,255,0.12);
    --paper:      #F6F8FC;
    --muted:      #93A8CC;
    --amber:      #FF7A33;
    --amber-dim:  #C25A22;
    --mint:       #2FE6B0;
    --red:        #FF6B6B;
  }
  *{ box-sizing:border-box; }
  html{ scroll-behavior:smooth; }
  html,body{ margin:0; padding:0; height:100%; }
  body{
    background:var(--ink); color:var(--paper);
    font-family:-apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing:antialiased; min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    position:relative; overflow-x:hidden; padding:32px 20px;
  }
  a, button, input{ font-family:inherit; }
  .bg-grid{
    position:fixed; inset:0;
    background-image: linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 60px 60px;
    -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 30%, black 10%, transparent 75%);
            mask-image: radial-gradient(ellipse 70% 60% at 50% 30%, black 10%, transparent 75%);
    opacity:0.5; pointer-events:none;
  }
  .bg-glow{
    position:fixed; width:760px; height:760px; left:50%; top:-380px; transform:translateX(-50%);
    background: radial-gradient(circle at center, rgba(47,230,176,0.14), transparent 65%);
    pointer-events:none;
  }
  .login-wrap{ position:relative; z-index:1; width:100%; max-width:400px; }
  .login-card{
    background:linear-gradient(165deg, var(--ink-2), var(--ink-3));
    border:1px solid var(--line); border-radius:20px;
    box-shadow:0 40px 80px -30px rgba(0,0,0,0.55); padding:38px 34px 30px;
  }
  .brand-head{ text-align:center; margin-bottom:26px; }
  .brand-icon{
    width:54px; height:54px; border-radius:15px;
    background: linear-gradient(155deg, var(--amber), var(--amber-dim));
    display:flex; align-items:center; justify-content:center; margin:0 auto 16px;
    box-shadow:0 14px 26px -12px rgba(255,122,51,0.55);
  }
  .brand-icon svg{ width:26px; height:26px; }
  .brand-name{ font-family:Georgia, Cambria, "Times New Roman", serif; font-size:24px; line-height:1.1; margin-bottom:4px; }
  .brand-portal{ font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:var(--mint); font-family:"SFMono-Regular", Menlo, Consolas, monospace; }
  .divider{ height:1px; background:var(--line); margin:26px 0 24px; }
  .form-head{ text-align:center; margin-bottom:26px; }
  .form-title{ font-family:Georgia, Cambria, "Times New Roman", serif; font-size:22px; margin:0 0 8px; }
  .form-sub{ font-size:13.5px; line-height:1.55; color:var(--muted); max-width:30ch; margin:0 auto; }
  .field{ margin-bottom:18px; }
  .field label{ display:block; font-size:11.5px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
  .input-wrap{ position:relative; display:flex; align-items:center; }
  .input-wrap svg{ position:absolute; left:14px; width:16px; height:16px; color:var(--muted); pointer-events:none; }
  .field input{
    width:100%; background:var(--ink); border:1px solid var(--line); color:var(--paper);
    font-size:14.5px; padding:13px 14px 13px 40px; border-radius:11px; outline:none;
    transition:border-color .18s ease, box-shadow .18s ease;
  }
  .field input::placeholder{ color:#5C7196; }
  .field input:focus{ border-color:var(--mint); box-shadow:0 0 0 3px rgba(47,230,176,0.15); }
  .toggle-pass{ position:absolute; right:12px; background:none; border:none; color:var(--muted); cursor:pointer; padding:4px; display:flex; align-items:center; }
  .toggle-pass svg{ position:static; width:16px; height:16px; }
  .toggle-pass:hover{ color:var(--paper); }
  .login-btn{
    width:100%; background:var(--amber); color:#241002; font-size:15px; font-weight:700;
    padding:14px; border:none; border-radius:11px; cursor:pointer; margin-top:6px;
    display:flex; align-items:center; justify-content:center; gap:9px;
    box-shadow:0 14px 30px -14px rgba(255,122,51,0.55);
    transition:transform .15s ease, box-shadow .15s ease, opacity .15s ease;
  }
  .login-btn:hover{ box-shadow:0 18px 32px -12px rgba(255,122,51,0.7); transform:translateY(-1px); }
  .login-btn:active{ transform:translateY(1px); }
  .login-btn:disabled{ opacity:0.75; cursor:default; transform:none; }
  .spinner{ width:15px; height:15px; border-radius:50%; border:2px solid rgba(36,16,2,0.35); border-top-color:#241002; animation:spin 0.7s linear infinite; display:none; flex-shrink:0; }
  .login-btn.loading .spinner{ display:block; }
  .login-btn.loading .btn-label{ display:none; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .form-note{ text-align:center; font-size:12px; color:var(--mint); min-height:16px; margin-top:14px; }
  .security-note{
    display:flex; align-items:center; justify-content:center; gap:8px; text-align:center;
    font-size:12px; color:var(--muted); margin-top:22px; padding-top:20px; border-top:1px solid var(--line);
  }
  .security-note svg{ width:14px; height:14px; color:var(--mint); flex-shrink:0; }
  .back-link{
    display:flex; align-items:center; justify-content:center; gap:8px; margin-top:22px;
    color:var(--muted); text-decoration:none; font-size:13.5px; font-weight:600;
  }
  .back-link svg{ width:15px; height:15px; flex-shrink:0; }
  .back-link:hover{ color:var(--paper); }
  input:focus-visible, button:focus-visible, a:focus-visible{ outline:2px solid var(--mint); outline-offset:2px; }
  @media (prefers-reduced-motion: reduce){ .spinner{ animation:none; } }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="login-wrap">
  <div class="login-card">

    <div class="brand-head">
      <span class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none"><path d="M4 16V8a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8M4 16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2M4 16h16M8 6V4h8v2" stroke="#241002" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><circle cx="8" cy="18.5" r="1.4" fill="#241002"/><circle cx="16" cy="18.5" r="1.4" fill="#241002"/></svg>
      </span>
      <div class="brand-name">BusGuard</div>
      <div class="brand-portal">Driver Portal</div>
    </div>

    <div class="divider"></div>

    <div class="form-head">
      <h1 class="form-title">Driver Login</h1>
      <p class="form-sub">Sign in to access your dashboard and start sharing your live location.</p>
    </div>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="driverId">Driver ID</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-7 8-7s8 2.6 8 7"/></svg>
          <input type="text" id="driverId" name="driverId" placeholder="e.g. DRV-1042" autocomplete="username" required>
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
          <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
          <button class="toggle-pass" type="button" id="togglePass" aria-label="Show password">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button class="login-btn" type="submit" id="loginBtn">
        <span class="spinner"></span>
        <span class="btn-label">Login</span>
      </button>

      <div class="form-note" id="formNote">&nbsp;</div>
    </form>

    <div class="security-note">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
      Only authorized drivers can access this portal.
    </div>

    <a class="back-link" href="{{ url_for('landing') }}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      Back to Home
    </a>

  </div>
</div>

<script>
  var toggleBtn = document.getElementById('togglePass');
  var passInput = document.getElementById('password');
  toggleBtn.addEventListener('click', function(){
    var isPass = passInput.getAttribute('type') === 'password';
    passInput.setAttribute('type', isPass ? 'text' : 'password');
    toggleBtn.setAttribute('aria-label', isPass ? 'Hide password' : 'Show password');
  });

  var form = document.getElementById('loginForm');
  var btn = document.getElementById('loginBtn');
  var note = document.getElementById('formNote');

  form.addEventListener('submit', function(e){
    e.preventDefault();
    if(!form.checkValidity()){
      note.style.color = '#FF6B6B';
      note.textContent = 'Enter your Driver ID and password to continue.';
      return;
    }
    btn.classList.add('loading');
    btn.disabled = true;
    note.textContent = '';

    fetch("{{ url_for('api_driver_login') }}", {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        driverId: document.getElementById('driverId').value.trim(),
        password: document.getElementById('password').value
      })
    })
    .then(function(res){ return res.json().then(function(data){ return {status: res.status, data: data}; }); })
    .then(function(result){
      btn.classList.remove('loading');
      btn.disabled = false;
      if(result.status === 200){
        note.style.color = '#2FE6B0';
        note.textContent = 'Login successful. Redirecting…';
        window.location.href = result.data.redirect;
      } else {
        note.style.color = '#FF6B6B';
        note.textContent = result.data.error || 'Login failed.';
      }
    })
    .catch(function(){
      btn.classList.remove('loading');
      btn.disabled = false;
      note.style.color = '#FF6B6B';
      note.textContent = 'Network error. Please try again.';
    });
  });
</script>

</body>
</html>
